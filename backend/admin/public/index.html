<!DOCTYPE html>
<html lang="fr">
<head>
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDC Admin</title>

  <style>
    :root {
      --bg: #0A0A0A;
      --card: #1C1C1E;
      --border: #2A2A2A;
      --text: #FFFFFF;
      --muted: #B8B8B8;
      --pink: #E8586E;
      --green: #4CAF50;
      --red: #EF5350;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    h1 { font-family: Georgia, serif; margin-bottom: 24px; letter-spacing: 1px; }
    h2 { margin: 24px 0 12px; font-size: 18px; }

    nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }

    nav button {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    nav button.active { background: var(--pink); border-color: var(--pink); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }

    .stat-label { color: var(--muted); font-size: 12px; }
    .stat-value { font-size: 32px; font-weight: bold; }

    input, textarea, select {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    textarea { min-height: 80px; }

    button.primary {
      background: var(--pink);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button.danger {
      background: var(--red);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    th { color: var(--muted); font-size: 12px; }

    .hidden { display: none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
  <h2>Connexion</h2>
  <input id="loginEmail" type="email" placeholder="email" />
  <input id="loginPw" type="password" placeholder="mot de passe" />
  <button id="loginBtn" class="primary">Connexion</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

  <h1>BDC Admin</h1>

  <nav>
    <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
    <button class="nav-btn" data-tab="products">Produits</button>
    <button class="nav-btn" data-tab="categories">Catégories</button>
    <button class="nav-btn" data-tab="news">News</button>
    <button class="nav-btn" data-tab="masterclass">Masterclass</button>
    <button class="nav-btn" data-tab="users">Users</button>
    <button class="nav-btn" data-tab="push">Push</button>
    <button id="logoutBtn" class="danger">Logout</button>
  </nav>

  <!-- PRODUCTS -->
  <section id="tab-products" class="tab hidden">
    <div class="card">
      <h2>Produits</h2>

      <input id="p_slug" placeholder="slug" />
      <input id="p_name" placeholder="nom" />
      <input id="p_price" type="number" placeholder="prix" />

      <button id="createProductBtn" class="primary">Créer produit</button>
    </div>

    <div class="card">
      <table>
        <tbody id="productsTbody"></tbody>
      </table>
    </div>
  </section>

</div>

<script>
const API = location.origin + '/api/v1';
let token = localStorage.getItem('bdc_admin_token');

/* API */
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: 'Bearer ' + token } : {})
    }
  });

  if (!res.ok) throw new Error("API error");
  return res.status === 204 ? null : res.json();
}

/* LOGIN */
async function login() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPw').value;

  const data = await api('/auth/login', {
    method: 'POST',
    body: JSON.stringify({ email, password })
  });

  token = data.token;
  localStorage.setItem('bdc_admin_token', token);

  boot();
}

/* NAV */
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
  document.getElementById('tab-' + tab)?.classList.remove('hidden');

  document.querySelectorAll('.nav-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab)
  );
}

/* PRODUCTS */
async function loadProducts() {
  const products = await api('/products');

  document.getElementById('productsTbody').innerHTML =
    products.map(p => `
      <tr>
        <td>${p.name}</td>
        <td>${p.price}</td>
        <td><button class="danger delete-product" data-id="${p.id}">Supprimer</button></td>
      </tr>
    `).join('');
}

/* BOOT */
function boot() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  showTab('dashboard');
  loadProducts();
}

/* EVENTS (FIX CSP COMPLET) */
document.addEventListener('click', async (e) => {

  if (e.target.id === 'loginBtn') login();

  if (e.target.id === 'logoutBtn') {
    localStorage.removeItem('bdc_admin_token');
    location.reload();
  }

  if (e.target.id === 'createProductBtn') {
    await api('/admin/products', {
      method: 'POST',
      body: JSON.stringify({
        slug: document.getElementById('p_slug').value,
        name: document.getElementById('p_name').value,
        price: Number(document.getElementById('p_price').value)
      })
    });

    loadProducts();
  }

  const del = e.target.closest('.delete-product');
  if (del) {
    await api('/admin/products/' + del.dataset.id, { method: 'DELETE' });
    loadProducts();
  }

  const nav = e.target.closest('.nav-btn');
  if (nav) showTab(nav.dataset.tab);
});

/* AUTO LOGIN */
if (token) boot();
</script>

</body>
</html>
